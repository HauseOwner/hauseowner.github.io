<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pong -- HauseOwner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .game-wrap { display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
      canvas { border: 1px solid var(--border); display: block; }
      .scores { display: flex; justify-content: space-between; width: 600px; max-width: 100%; padding: 0.5rem 0; }
      .score-block { text-align: center; }
      .score-block .label { font-size: 11px; color: var(--fg-dim); display: block; letter-spacing: 0.1em; }
      .score-block span:not(.label) { font-size: 1.4rem; color: #ffffff; }
      .overlay { width: 600px; max-width: 100%; text-align: center; padding: 1.5rem 0; }
      .overlay-title { font-size: 1.4rem; color: #ffffff; margin-bottom: 0.5rem; letter-spacing: 0.04em; }
      .overlay-sub { font-size: 12px; color: var(--fg-dim); letter-spacing: 0.08em; margin-bottom: 1.5rem; }
      .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
      .game-btn { background: transparent; border: 1px solid var(--border); color: var(--fg-dim); font-family: var(--font); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; transition: color 0.1s, border-color 0.1s; }
      .game-btn:hover { color: var(--red); border-color: var(--red-dim); }
      .game-btn.selected { color: var(--red); border-color: var(--red); }
      .hint { font-size: 11px; color: var(--fg-dim); margin-top: 1rem; letter-spacing: 0.06em; }
      .diff-label-mid { font-size: 11px; color: var(--fg-dim); align-self: center; letter-spacing: 0.1em; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <nav>
      <span class="nav-brand">hauseowner://</span>
      <button class="nav-btn" onclick="location.href='../index.html'">HOME</button>
      <button class="nav-btn" onclick="location.href='../index.html#projects'">PROJECTS</button>
      <button class="nav-btn active" onclick="location.href='../index.html#games'">GAMES</button>
    </nav>

    <main class="game-wrap">

      <div id="overlay" class="overlay">
        <p class="overlay-title">PONG</p>
        <p class="overlay-sub">// vs cpu &mdash; first to 10 wins</p>
        <p style="font-size:11px;color:var(--fg-dim);letter-spacing:0.1em;margin-bottom:0.75rem;">SELECT DIFFICULTY</p>
        <div class="btn-row" id="diff-row">
          <button class="game-btn" onclick="selectDiff('easy',this)">EASY</button>
          <button class="game-btn" onclick="selectDiff('medium',this)">MEDIUM</button>
          <button class="game-btn" onclick="selectDiff('hard',this)">HARD</button>
        </div>
        <div class="btn-row" style="margin-top:1.25rem;">
          <button class="game-btn" id="start-btn" onclick="startGame()" style="opacity:0.3;pointer-events:none;">START GAME</button>
        </div>
      </div>

      <div id="game-area" class="hidden" style="display:flex;flex-direction:column;align-items:center;">
        <div class="scores">
          <div class="score-block"><span class="label">YOU</span><span id="s-player">0</span></div>
          <div class="diff-label-mid" id="diff-label"></div>
          <div class="score-block"><span class="label">CPU</span><span id="s-cpu">0</span></div>
        </div>
        <canvas id="c" width="600" height="400"></canvas>
        <p class="hint">W / S or mouse to move &nbsp;&bull;&nbsp; ESC to quit</p>
      </div>

      <div id="result-wrap" class="overlay hidden">
        <p class="overlay-title" id="result-title"></p>
        <p class="overlay-sub" id="result-sub"></p>
        <div class="btn-row">
          <button class="game-btn" onclick="rematch()">REMATCH</button>
          <button class="game-btn" onclick="backToMenu()">MENU</button>
        </div>
      </div>

    </main>

    <script>
      const W=600,H=400,PW=12,PH=80,BALL=8,WIN=10;
      let diff=null,raf=null,state={};
      const diffSettings = {
        easy:   { speed: 3.5, ai: 0.04 },
        medium: { speed: 5,   ai: 0.08 },
        hard:   { speed: 7,   ai: 0.18 }
      };
      
      function selectDiff(d, btn) {
        diff = d;
        document.querySelectorAll('#diff-row .game-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const sb = document.getElementById('start-btn');
        sb.style.opacity = '1';
        sb.style.pointerEvents = 'auto';
      }

      function startGame() {
        document.getElementById('overlay').classList.add('hidden');
        document.getElementById('result-wrap').classList.add('hidden');
        const ga = document.getElementById('game-area');
        ga.classList.remove('hidden');
        ga.style.display = 'flex';
        document.getElementById('diff-label').textContent = diff.toUpperCase();
        resetState();
        bindInput();
        loop();
      }

      function resetState() {
        const s = diffSettings[diff];
        const ang = (Math.random() * Math.PI / 3) - (Math.PI / 6);
        const dir = Math.random() < 0.5 ? 1 : -1;
        state = {
          px:16, py:H/2-PH/2,
          cx:W-16-PW, cy:H/2-PH/2,
          bx:W/2, by:H/2,
          bvx: s.speed * dir * Math.cos(ang),
          bvy: s.speed * Math.sin(ang),
          ps:0, cs:0,
          up:false, dn:false,
          mouse:null,
          speed: s.speed,
          ai: s.ai,
          running:true
        };
        document.getElementById('s-player').textContent = '0';
        document.getElementById('s-cpu').textContent = '0';
      }

      function bindInput() {
        document.onkeydown = e => {
          if (e.key==='w'||e.key==='W') state.up = true;
          if (e.key==='s'||e.key==='S') state.dn = true;
          if (e.key==='Escape') backToMenu();
        };
        document.onkeyup = e => {
          if (e.key==='w'||e.key==='W') state.up = false;
          if (e.key==='s'||e.key==='S') state.dn = false;
        };
        const canvas = document.getElementById('c');
        canvas.onmousemove = e => {
          const r = canvas.getBoundingClientRect();
          state.mouse = e.clientY - r.top;
        };
        canvas.onmouseleave = () => { state.mouse = null; };
      }

      function unbindInput() {
        document.onkeydown = null;
        document.onkeyup = null;
      }

      function loop() {
        if (!state.running) { cancelAnimationFrame(raf); return; }
        update();
        draw();
        raf = requestAnimationFrame(loop);
      }

      function update() {
        const s = state;
        if (s.mouse !== null) { s.py = s.mouse - PH / 2; }
        else { if (s.up) s.py -= 5; if (s.dn) s.py += 5; }
        s.py = Math.max(0, Math.min(H - PH, s.py));

        const targetY = s.by - PH / 2;
        s.cy += (targetY - s.cy) * s.ai;
        s.cy = Math.max(0, Math.min(H - PH, s.cy));

        s.bx += s.bvx;
        s.by += s.bvy;

        if (s.by <= 0) { s.by = 0; s.bvy *= -1; }
        if (s.by >= H - BALL) { s.by = H - BALL; s.bvy *= -1; }

        if (s.bvx < 0 && s.bx <= s.px + PW && s.bx >= s.px && s.by + BALL >= s.py && s.by <= s.py + PH) {
          s.bx = s.px + PW;
          const rel = (s.by + BALL/2 - (s.py + PH/2)) / (PH/2);
          const ang = rel * Math.PI / 3;
          const spd = Math.min(s.speed * 1.05, 14);
          s.bvx = spd * Math.cos(ang);
          s.bvy = spd * Math.sin(ang);
          s.speed = spd;
        }
        if (s.bvx > 0 && s.bx + BALL >= s.cx && s.bx + BALL <= s.cx + PW && s.by + BALL >= s.cy && s.by <= s.cy + PH) {
          s.bx = s.cx - BALL;
          const rel = (s.by + BALL/2 - (s.cy + PH/2)) / (PH/2);
          const ang = rel * Math.PI / 3;
          const spd = Math.min(s.speed * 1.05, 14);
          s.bvx = -spd * Math.cos(ang);
          s.bvy = spd * Math.sin(ang);
          s.speed = spd;
        }

        if (s.bx < 0) { s.cs++; document.getElementById('s-cpu').textContent = s.cs; checkWin(); serve(1); }
        if (s.bx > W) { s.ps++; document.getElementById('s-player').textContent = s.ps; checkWin(); serve(-1); }
      }

      function serve(dir) {
        const ds = diffSettings[diff];
        state.speed = ds.speed;
        const ang = (Math.random() * Math.PI / 4) - (Math.PI / 8);
        state.bx = W / 2; state.by = H / 2;
        state.bvx = ds.speed * dir * Math.cos(ang);
        state.bvy = ds.speed * Math.sin(ang);
      }

      function checkWin() {
        if (state.ps >= WIN) endGame(true);
        else if (state.cs >= WIN) endGame(false);
      }

      function endGame(playerWon) {
        state.running = false;
        unbindInput();
        cancelAnimationFrame(raf);
        document.getElementById('game-area').classList.add('hidden');
        const rw = document.getElementById('result-wrap');
        rw.classList.remove('hidden');
        document.getElementById('result-title').textContent = playerWon ? 'YOU WIN' : 'GAME OVER';
        document.getElementById('result-sub').textContent = playerWon ? '// well played' : '// better luck next time';
      }

      function draw() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const s = state;
        ctx.fillStyle = '#0e0e0e'; ctx.fillRect(0, 0, W, H);
        ctx.setLineDash([6,6]); ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(s.px, s.py, PW, PH);
        ctx.fillRect(s.cx, s.cy, PW, PH);
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(s.bx, s.by, BALL, BALL);
      }

      function rematch() {
        document.getElementById('result-wrap').classList.add('hidden');
        startGame();
      }

      function backToMenu() {
        state.running = false;
        unbindInput();
        cancelAnimationFrame(raf);
        document.getElementById('game-area').classList.add('hidden');
        document.getElementById('result-wrap').classList.add('hidden');
        document.getElementById('overlay').classList.remove('hidden');
        diff = null;
        document.querySelectorAll('#diff-row .game-btn').forEach(b => b.classList.remove('selected'));
        const sb = document.getElementById('start-btn');
        sb.style.opacity = '0.3';
        sb.style.pointerEvents = 'none';
      }
    </script>
  </body>
</html>
