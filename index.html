<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>HauseOwner.com</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Georgia;
                background-color: #ffffff;
                color: #1a1a1a;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 2rem;
            }

            nav {
                background-color: #1a1a1a;
                display: flex;
                align-items: center;
                padding: 0 1.5rem;
                height: 52px;
                gap: 4px;
            }

            .nav-brand {
                font-size: 14px;
                font-weight: 500;
                color:#ffffff;
                margin-right: auto;
                letter-spacing: 0.04em;
            }

            .nav-btn {
                background: transparent;
                border: none;
                color: #aaaaaa;
                font-size: 13px;
                font-weight: 500;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 6px 14px;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
            }

            .nav-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                color: #ffffff;
            }

            .nav-btn.active {
                background: rgba(255, 255, 255, 0.12);
                color: #ffffff;
            }

            .nav-btn {
                background: transparent;
                border: none;
                color: #aaaaaa;
                font-size: 13px;
                font-weight: 500;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                padding: 6px 14px;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
            }

            .nav-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                color: #ffffff;
            }

            .nav-btn.active {
                background: rgba(255, 255, 255, 0.12);
                color: #ffffff;
            }

            .page {
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                min-height: calc(100vh - 52px);
                padding: 3rem 2rem;
            }

            .page.active {
                display: flex;
            }

            .page-label {
                font-size: 12px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #888888;
                margin-bottom: 1rem;
            }

            h1 {
                font-size: 2.2rem;
                font-weight: 500;
                margin-bottom: 1.5rem;
            }

            .divider {
                width: 48px;
                height: 2px;
                background-color: #dddddd;
                border-radius: 2px;
                margin: 0 auto 1.5rem;
            }

            .subtitle {
                font-size: 1rem;
                color: #555555;
                line-height: 1.7;
            }

            .coming-soon {
                display: inline-block;
                font-size: 12px;
                background: #f5f5f5;
                color: #888;
                border: 1px solid #e0e0e0;
                border-radius: 20px;
                padding: 4px 12px;
                margin-top: 1rem;
            }

        </style>
    </head>
    <body>
        <nav>
            <span class="nav-brand">HauseOwner.com</span>
            <button class="nav-btn active" onclick="show('home', this)">Home</button>
            <button class="nav-btn" onclick="show('projects', this)">Projects</button>
            <button class="nav-btn" onclick="show('games', this)">Games</button>
        </nav>

        <section id="page-home" class="page active">
            <p class="page-label">HauseOwner.com</p>
            <h1>Welcome to my website.</h1>
            <div class="divider"></div>
            <p class="subtitle">More coming soon. Stay tuned.</p>
        </section>

        <section id="page-projects" class="page">
            <p class="page-label">Projects</p>
            <h1>My Projects</h1>
            <div class="divider"></div>
            <p class="subtitle">Nothing here yet.</p>
            <span class="coming-soon">Coming soon</span>
        </section>

        <section id="page-games" class="page">
            <p class="page-label">Games</p>
            <h1>Games</h1>
            <div class="divider"></div>
            <p class="subtitle">Nothing here yet.</p>
            <span class="coming-soon">Coming soon</span>
        </section>

        <script>
            function show(id, btn) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('page-' + id).classList.add('active');
                btn.classList.add('active');
            }
        </script>

    </body>
</html>
